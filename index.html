<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Tanoya Banerjee Portfolio - Senior System Analyst">
    <meta name="author" content="Tanoya Banerjee">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <title>Таноя Банерджи — Портфолио</title>

    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed:100,200,300,400,500,600,700,800,900" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i,800,800i" rel="stylesheet">
    <link href="font-awesome/css/font-awesome.min.css" rel="stylesheet">
    <link href="css/devicons/css/devicons.min.css" rel="stylesheet">
    <link href="css/simple-line-icons/css/simple-line-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">

    <style>
        /* ==========================================
           1. ШРИФТЫ И РАЗМЕР ИМЕНИ
           ========================================== */
        body, h1, h2, h3, h4, h5, h6, .content__name, .main-item__title, .title, .subheading {
            font-family: 'Open Sans', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important;
        }

        h1.mb-0 {
            font-size: 4rem !important; 
            line-height: 1.1;
        }
        @media (max-width: 768px) {
            h1.mb-0 {
                font-size: 2.8rem !important;
            }
        }

        /* ==========================================
           2. ВЫРАВНИВАНИЕ КАРТОЧЕК ОПЫТА ПО ВЫСОТЕ
           ========================================== */
        #experience .row {
            display: flex;
            flex-wrap: wrap;
        }
        .resume-item {
            display: flex !important;
            align-items: stretch;
        }
        .resume-item .card {
            display: flex !important;
            flex-direction: column !important;
            justify-content: space-between !important;
            width: 100% !important;
            height: calc(100% - 3rem); 
            margin-bottom: 3rem !important;
        }
        .resume-content {
            flex-grow: 1;
        }

        /* ==========================================
           3. ИЗМЕНЕНИЕ ОСНОВНОГО ЦВЕТА
           ========================================== */
        .text-primary { color: #6b2828 !important; }
        .bg-primary { background-color: #6b2828 !important; }
        
        .heading-border, .heading-border-light { 
            background-color: #6b2828 !important; 
            border-bottom: 2px solid #6b2828 !important; 
        }
        
        .btn-general.btn-green {
            color: #6b2828 !important;
            border-color: #6b2828 !important;
        }
        .btn-general.btn-green.active, .btn-general.btn-green:hover { 
            background-color: #6b2828 !important; 
            border-color: #6b2828 !important; 
            color: #ffffff !important;
        }

        .about-text { 
            color: #343a40 !important; 
            font-weight: 500;
        }
        
        .contact-centered {
            margin: 0 auto;
            max-width: 600px;
        }

        /* ==========================================
           4. ЖЕСТКОЕ ПЕРЕОПРЕДЕЛЕНИЕ СИНЕГО ЦВЕТА
           ========================================== */
        /* Раздел "Проекты/Сертификаты" - цвет полупрозрачной заливки при наведении */
        .portfolio-item .portfolio-link .caption-port {
            background-color: rgba(107, 40, 40, 0.9) !important;
        }
        
        /* Раздел "Образование" - убираем синий из заголовков и иконок */
        .award .title, .award h5.title, .award h5 {
            color: #6b2828 !important;
        }
        .main-award .award-icon {
            background-color: #fff !important;
            border-color: #6b2828 !important;
            border: 3px solid #6b2828 !important;
        }
        .main-award .award:hover .award-icon {
            background-color: #6b2828 !important;
            border-color: #6b2828 !important;
        }
        
        /* Фикс для ромбиков на самой линии таймлайна */
        .main-award .award::before, .main-award .award::after,
        .award-icon::before, .award-icon::after {
            background-color: #6b2828 !important;
            border-color: #6b2828 !important;
        }
        
        /* ФИКС: Маленький ромбик-соединитель от карточки к линии таймлайна */
        .main-award .award-content::before,
        .main-award .award-content::after {
            background-color: #6b2828 !important;
        }
        .main-award .award:nth-child(odd) .award-content::before,
        .main-award .award:nth-child(odd) .award-content::after {
            border-left-color: #6b2828 !important;
        }
        .main-award .award:nth-child(even) .award-content::before,
        .main-award .award:nth-child(even) .award-content::after {
            border-right-color: #6b2828 !important;
        }

        /* ==========================================
           5. ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ
           ========================================== */
        .lang-switcher {
            position: fixed;
            top: 20px;
            right: 30px;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            border: 1px solid #eee;
        }
        .lang-switcher a {
            color: #343a40;
            text-decoration: none;
            padding: 0 5px;
            transition: color 0.3s;
            cursor: pointer;
        }
        .lang-switcher a:hover {
            color: #6b2828;
        }
        .lang-switcher a.active {
            color: #6b2828;
            text-decoration: underline;
        }
        .lang-switcher span {
            color: #ccc;
        }
        @media (max-width: 991px) {
            .lang-switcher {
                top: 15px;
                right: 80px; 
                padding: 6px 12px;
            }
        }

        /* ==========================================
           6. ЛОГИКА ОТОБРАЖЕНИЯ ЯЗЫКОВ
           ========================================== */
        body.ru .en { display: none !important; }
        body.en .ru { display: none !important; }

        /* ==========================================
           7. РАЗМЕР И ОБРЕЗКА КАРТИНОК ПРОЕКТОВ
           ========================================== */
        .portfolio-item img {
            width: 100%;
            aspect-ratio: 4 / 3; /* Задает пропорции плитки */
            object-fit: cover; /* Заполняет рамку без искажений */
            object-position: top; /* Прижимает к верху, обрезая низ */
        }
    </style>
</head>

<body id="page-top" class="ru">
    
    <div class="lang-switcher">
        <a id="btn-ru" class="active" onclick="switchLang('ru')">RU</a> 
        <span>|</span> 
        <a id="btn-en" onclick="switchLang('en')">EN</a>
    </div>
